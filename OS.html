<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Console Debate OS</title>
  <link rel="stylesheet" href="Font.css">
</head>
<body>
  <div class="box">
    <h1>Welcome To My Console OS</h1>
    <h2>Introduction</h2>
    <h3>Hello Everyone, You have Made your way to my OS! This OS is designed to provide 2 different popular Console experiences!</h3>
    <p>What's your Favorite Console to Play on?</p>
    <img src="./Controller Image.webp" alt="Controller" />
    <p>
      <a href="https://direct.playstation.com/en-us/hardware/ps5?emcid=pa-co-520653&gclid=f2b395f06b251b8d762effde68e85ba6&gclsrc=3p.ds&msclkid=f2b395f06b251b8d762effde68e85ba6/">PlayStation Website</a><br />
      <a href="https://www.xbox.com/en-US/?msockid=0da9affa04b3680c3a5eb93705316913/">Xbox Website</a>
    </p>
  </div>
  <style>
    body {
      background-image: url('./Contoller BG.webp');
      background-size: cover;
      margin: 0;
      min-height: 100vh;
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      backdrop-filter: blur(10px);
      background-color: rgba(0, 0, 0, 0.25);
      color: #fff;
      box-sizing: border-box;
      z-index: 10;
    }
  </style>

  <div class="status-bar">
    <p>Console OS</p>
    <p id="user-time"></p>
  </div>

  <script>
    function updateUserTime() {
      const now = new Date();
      const formatted = now.toLocaleString([], {
        weekday: 'short',
        year: 'numeric',
        month: 'numeric',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit',
      });
      document.getElementById('user-time').textContent = formatted;
    }

    updateUserTime();
    setInterval(updateUserTime, 1000);
  </script>
</body>
</html>
